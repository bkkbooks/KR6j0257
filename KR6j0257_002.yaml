body:
  text: 唐總持寺三藏沙門智通譯爾時觀世音菩薩説是呪時三千大千世界乃至非想非非想天六反震動色究竟天摩醯首羅戰栗不安皆大恐懼一切惡鬼皆大叫喚受大苦惱東西散走莫知所趣爾時化身語諸大衆及諸惡鬼神等若不隨順我呪者違逆者頭破粉碎此呪能摧碎諸山乾竭大海此呪能摧伏阿修羅軍護諸國土此呪能摧伏一切諸惡鬼神一切諸病一切惡毒一切惡人此呪能摧破三十三天皆令降伏若善男子有能誦持此呪者其人威力説不可盡此呪能令誦持之者豪貴自在亦能令國王終身愛念稱意所求悉皆滿足若欲降伏魔怨者當燒求羅香誦我身呪二十一遍若欲令一切人愛己者呪楊枝二十一遍口中嚼之即得愛敬若欲令自身辨才智慧者呪菖蒲一千八遍塗其心上即得辨才無礙作姥陀羅尼心印辨才無礙印呪第十三以兩手相背合掌大母指向前舒此印能自護護他當須結界隨所遊方或呪淨水或呪淨灰各呪七遍所在住處以手掬水掬灰先灑自身然後向於四方四角如法散灑若有善男子善女人被諸惡鬼衆邪魍魎之所惑亂者取石榴枝及柳枝陰誦此呪輕打病人無病不差呪曰南無薩婆佛陀達摩僧祇比耶南無阿利耶婆盧吉低攝伐羅𡃂菩提薩多跛寫南無跋折羅波尼寫菩提薩多波寫跢姪他徒比徒比迦耶徒比婆羅闍婆羅尼馺皤訶此呪印能降伏諸邪見外道若有善男子善女人於晨朝時日三時各誦一遍者即與種種供養十億諸佛無有異也永不受女身命終之後永離三塗即得往生阿彌陀佛國如來授手摩頂汝莫怖懼來生我國現身不被橫死不為鬼神之所得便破三千大三世界滅罪印第十四起立以左手向前展臂五指向前散托竪五指次以右手大母指屈在掌中以四指把拳當右耳上當誦身呪頭指來去此印日別須三時一時誦七遍能滅五逆四重罪於一切衆生生慈慈心即能燒一切罪根此身滅後即為值佛於彼佛土得作轉輪聖王復得陀羅尼名曰無盡藏復得三昧名智等復得身中二十八種相現現身不患眼舌耳鼻等病乃至身中一切疾病悉能消滅若有先業罪者亦得消滅若見天旱時取烏麻子和毗麻子脂作丸呪一百八遍擲著湫水中即得雨若雨過多取稻穀炒作華取蔓菁子脂和作丸呪之一百八遍擲著湫水中雨即止也降伏三千大千世界魔怨印第十五以五指相叉左壓右急把拳當頂上著誦身呪即降伏若作此法向舍利塔前二十九日夜取白檀香作末塗地作曼荼羅其中散種種華澡浴清淨著新淨衣手把香爐燒沈水香面向東坐呪一千八遍此是最初功能又取芥子烏麻著一處搗為末以三指撮取少許呪之一遍擲著火中如是七日日別誦一百八遍然後所作皆悉成就廣大無畏印第十六起立並足先以右手仰垂左肘膝頭左手亦如之於舍利像前誦身呪一百八遍即得無畏施於衆生又取槐香白芥子菖蒲捨多婆利外國藥名以此等物內火中燒之燒火之時應於佛前或在淨處誦呪三十二遍以香華供養呪法悉皆成就所為之者皆悉剋果若餘呪無驗以此呪呪之亦皆成就若欲乞夢誦此呪并作印眠即有夢隨所欲見皆得見之若人無福所向不諧者日誦三遍呪滿七日諸有所求一切皆得爾時菩薩在娑竭羅龍宮海會説法見諸龍衆受大苦惱愍諸龍衆為度苦惱衆生悉得離苦無諸怨害爾時龍女獻一寶珠價直娑婆世界為求法故吾為廣説離諸苦難水精菩薩護持千眼印呪第十七爾時水精菩薩為欲利益護持此呪而説呪曰毗摩隸摩訶毗摩隸郁呵隸摩訶郁呵隸休摩隸摩訶休摩隸薩訶隸止隸睇馺婆訶若有善男子善女人在所遊方受持此千眼千臂菩薩法者我當常隨衛護乃至諸魔眷屬無惱亂者若人急難他國相侵盜賊逆亂當取五色縷結誦呪二十一遍一遍一結繫於左臂又以左手無名指中指頭指把拳大母指壓上展小母指指所至賊方誦呪七遍悉皆退散不能為害爾時觀世音菩薩在雪山中説法觀見夜叉羅剎國中人民唯食衆生血肉無有善心菩薩為欲利益方便教化衆生以神通力尋至彼國現千眼千臂降魔身説成就姥陀羅尼法爾時羅剎國王來至我所求哀頂禮我以成就印印之即得成無上道成就印第十八起立並足合掌當心以小指相叉左壓右誦身呪二十一遍種種皆得成就若救六道苦難衆生當用輪印以十指頭各相拄開腕掌中使開其指間各相去一寸許即是菩薩在六道循環度諸苦難以此印輪回悉得離苦此印法拔吒那羅延長年師才翻便即歸國并將所翻之本智通畢竟尋逐不得遇於一僧邊得梵本譯出在外無本成等正覺印第十九結跏趺坐先以左手舒五指仰掌在左膝上次以右手舒五指覆手捺右膝上此與滅盡印法同過去未來現在諸佛皆同此印得佛菩提此印能除一切業障若坐禪諸法不現前者當七日七夜於阿練若處誦此陀羅尼并此印法至心念佛晝夜六時懺悔即得諸法現前及所得福無量無邊不可稱計呼召三十三天印第二十先以左手四指把拳次以右手握左手大母指亦如把拳令左手大母指在右手虎口中出頭以右手頭指來去呪曰唵一俱智俱智二俱耶利三遮利遮利四遮犁隸五蘇婆訶此陀羅尼印呪不可思議若善男子善女人臨欲眠時誦此呪一百八遍心中所願於夢寐中悉得知見若能日日誦此呪者亦能滅一切罪不失菩提心其人昏夜寐夢漸漸增廣皆得吉祥乃至夢見如來在菩提樹下授記成道乃至釋梵諸天常來侍衛呼召天龍八部鬼神印第二十一起立並足先以左手大母指屈在掌中四指把拳當心上著次以右手亦如之以右手在右耳邊以頭指來去呪曰南無尼健陀上聲一南無阿利闍波陀去聲二馺婆訶三南無阿利闍羅馺婆訶四堙醯夷醯五馺婆訶此呪印若善男子善女人受持讀誦者知七世宿命毒蛇不敢螫毒藥自然除刀不能害王亦不能瞋永劫不受地獄苦若誦此呪時二十八部鬼神來詣誦呪人邊坐聽誦呪若善男子善女人為鬼魅所著以白縷為呪索一遍一結如是四十九結繫其咽下其病即除若國內災疫流行國人死亡多者當取國王園池中蓮華一百八莖一華各呪一遍擲著火中燒令蕩盡災疫即除解脫印第二十二結跏趺坐先以左手中指與大母指頭相捻仰掌向上餘三指散展置於左膝上次以右手亦如之覆手置於右膝上誦身呪二十一遍所願悉皆滿足諸有苦惱悉皆解脫若善男子善女人具造十惡五逆等罪如閻浮提履地變為微塵一一微塵成於一劫是人造若干等罪應墮地獄歷劫受苦永無出期是善男子善女人能於舍利及佛像前白月十五日一日一夜不食結印誦呪滿一百八遍如上諸罪苦惱悉皆消滅若不滅者無有是處此印智通本上先無智通於涼州逢一婆羅門僧有此梵本遇會勘之更有此印自得受持大有功效不可思議自在神足印第二十三起立先以左手握右腳大母指如把拳次以右手握左手腕背上誦身呪七遍欲進千里不以為難誦呪之時勿令聲出神變自在印第二十四先以左手大母指捻小指甲上次以右手亦如之餘三指各散竪合腕相著置於頂上誦身呪二十一遍皆得遊行自在昔有罽賓國僧闍提於北天竺求得此梵本未曾翻譯自得受持威力廣大不敢流傳智通於此僧弟婆伽伽邊得本依法受持功效不少唯不流行於世此本絶無後同學得者願同功力王心印呪第二十五兩手合掌虛掌內合腕二頭指來去呪曰唵一阿嚕力帝囇路迦夜去聲毗社時賀切耶二薩婆鑠覩嚧二合鉢囉麼馱那三迦囉耶𤙖泮莎訶爾時觀世音菩薩告諸大衆言若佛滅後於末法時五百年中閻浮提人忽眼見及耳聞我此法印陀羅尼法門者當知此人過去已曾供養無量諸佛今得值遇得我此法印陀羅尼抄寫受持讀誦如法修行者即得初地速成佛果得阿耨多羅三藐三菩提爾時觀世音菩薩聞佛説已歡喜信受作禮而去
