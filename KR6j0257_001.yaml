body:
  text: 唐總持寺三藏沙門智通譯爾時觀世音菩薩摩訶薩白佛言世尊是我前身不可思議福德因緣今蒙世尊與我授記欲令利益一切衆生起大悲心能斷一切繫縛能滅一切怖畏一切衆生蒙此威神悉離苦因獲安樂果若有善男子善女人於我滅後五百歲中能於日夜六時依法受持此陀羅尼神呪法門者一切業障悉皆消滅一切陀羅尼法悉皆成就今我念報世尊恩德隨在何等乃至村城國邑聚落或在山野林間我常隨逐擁護是人不令一切神鬼之所嬈害爾時觀世音菩薩又白佛言世尊後五百歲中衆生垢重薄福者多不能專念設有受者或被鬼神之所侵害今我以佛威神之力廣為饒益一切衆生安樂天人阿修羅等為說陀羅尼法我於過去無量劫中已曾親近供養如是陀羅尼法乃至過去未來現在諸佛皆因此陀羅尼法門得成阿耨多羅三藐三菩提若有善男子善女人等專念受持此陀羅尼法門者此人現世口說流利無所質礙慧辨通達於一切天人大衆中最為第一聞者歡喜悉皆稽首在所生處常得見佛法僧有所言說人皆信受當知此是諸佛威神之力非我自力爾時世尊讚歎觀世音菩薩言善哉善哉汝能如是利益安樂天人阿修羅等及淨業道我今以智印印之令汝永不退轉爾時觀世音菩薩又白佛言世尊我念過去無量劫中持此陀羅尼法門在布怛羅山中乃逢魔王領諸魔衆惱亂我法令使呪句不成爾時我以此陀羅尼法降伏是魔悉皆退散當知此陀羅尼力不可思議爾時觀世音菩薩慈悲故利益故安樂天人故即說姥陀羅尼法根本大身呪用後總攝身印那麼薩囉婆二合若爾那切耶一娜謨喝囉怛那二合多羅二合夜引也二娜謨阿弭陀婆重平耶怛他揭多耶三阿囉訶羝三藐三菩陀耶四娜謨阿唎耶二合跋路枳帝五濕嚩二合囉耶六菩提薩埵耶七摩訶薩埵耶八摩訶迦嚕尼去聲迦耶九娜謨摩訶薩他摩二合波羅二合鉢多二合耶十菩提薩埵耶十一摩訶薩埵耶十二摩訶迦嚕尼迦耶凡迦字皆鳩耶切十三娜謨毗補羅毗麼那十四素上聲鉢喇二合底丁枳切瑟恥二合多去聲十五僧棄長耶素引唎耶二合舍多娑訶薩囉二合阿羝唎引迦十六鉢囉二合婆重平聲阿嚩皆肥麼切婆重平聲悉多短慕引㗚怛重去聲短二合曳十七摩訶末尼去聲摩矩吒軍荼囉陀㗚泥去聲十八薄伽伐底丁里切鉢頭摩二合波引拏上聲曳十九薩囉婆二合路迦阿阿字是上聲迦字上聲長緣此句內有阿字更不須迦引聲跛長去聲耶二十奢去聲麼那去聲長耶二十一毗毗去聲陀毒長佉三摩鞞去聲引舍吠瑟吒二合二十二薩婆薩埵跛哩慕者那去聲引耶二十三怛姪他二十四唵二十五勃重部長皤伏訛切二十六摩訶路迦羯囉短𧹞二十七那哆丁舸切麼二十八悉底丁里切二合弭短囉二十九鉢吒囉三十毗那舍娜引迦囉耶三十一囉伽墜二合引沙摩訶慕引訶闍引羅三十二奢摩去聲迦三十三奢婆迦三十四囉訖叉迦三十五薩婆波耶突唎揭二合底平聲三十六鉢囉二合舍麼迦那揭囉耶三十七薩婆怛他揭哆三十八三摩嚩馱重引那羯囉短三十九醯醯重努氣道四十摩訶菩提薩埵嚩囉馱四十一鉢頭摩二合路引迦三步重陀四十二摩訶迦嚧尼迦四十三折植列切引吒上聲麼矩吒長上聲楞近冷切訖㗚哆二合四十四舍唎蘭摩尼羯那上聲迦囉闍哆跋折囉二合吠住𠻗耶二合四十五楞訖㗚引多舍利囉四十六阿弭哆引婆視那短四十七上聲迦摩囉楞訖㗚哆四十八鉢囉二合引皤去聲引囉那囉哩者那四十九摩訶社那娜囉短那長唎五十舍哆娑訶薩囉二合阿毗重平聲囉使哆迦耶五十一摩訶菩提薩埵五十二毗馱摩毗馱摩五十三毗那舍耶毗那舍耶五十四摩訶引演覩魯二合訖隸二合引奢迦皤去聲吒皤去聲畔哆僧娑囉迦上聲短五十五波羅迦囉二合摩他那五十六布嚧沙鉢頭摩二合五十七布嚕沙那伽五十八布嚕沙婆伽囉五十九毗囉毗羅闍耶六十素誕多素誕跢六十一鉢哩筏哩二合重多六十二馱摩馱摩六十三些摩些摩六十四度重嚧度嚧六十五鉢囉二合奢引薩短耶六十六鉢羅二合奢引薩耶六十七祁重去聲囄祁囄六十八毗囄毗囄六十九只囄只囄七十姥音母嚧姥嚧七十一姥庾姥庾七十二悶遮悶遮七十三度那度那七十四毗近佛音度那毗度那七十五度嚕度嚕七十六伽去聲引耶伽耶七十七伽馱耶伽馱耶七十八喝娑喝娑七十九鉢囉二合訶娑鉢囉訶娑八十毗去聲毗上聲馱八十一羯隸二合奢去聲八十三嚩去聲引薩短那麼麼寫某甲八十三荷囉去聲荷囉八十四僧司孕切荷囉僧荷囉八十五別入覩重嚕徵八十六知智切覩嚕徵摩訶曼荼去聲短羅八十七迦囉拏八十八舍哆鉢囉二合細迦八十九皤婆重娑九十毗娑那長舍麼迦九十一摩訶菩提薩埵九十二皤囉馱九十三莎訶九十四句此陀羅尼名薄伽梵蓮華手嚴飾寶仗世尊於大金剛歡喜殿說為尊勝菩薩及無量天龍緊那羅之所讚歎為摧壞廣大業障山故若有得聞者若讀若誦若得覩視者此人所有一切煩惱業障悉得消滅若有人於晨朝時生尊重心誦此陀羅尼者常為觀世音菩薩恆常隨逐擁護是人所思念事皆得成就若有求願使得成就者當獨坐靜處心念觀世音菩薩更勿餘緣誦此陀羅尼七遍無願不果又得一切衆生之所愛樂不墮一切惡趣之中若坐若行若住常念佛如對目前者是人於無量百千俱胝生所有積集諸惡罪業皆得消滅是人當得具足千轉輪王之福生生常得與觀世音菩薩同時出生生貴姓家若以一掬香華散於觀世音菩薩前誦此陀羅尼七遍者得大千功德大悲法性彼人於世間得大力成就若至心看菩薩面誦此陀羅尼者即得見觀世音菩薩微笑相見已即得離垢地能照耀世間即於此生當得見佛臨命終時如入禪定生生之處得宿命智所有罪障皆悉消滅若欲受持此陀羅尼者當於白月十五日受持八戒齊著白淨衣於有舍利塔前及有舍利處諸佛前並得用白檀作壇其白檀於石上磨取末用塗地以種種華散彼壇內佛前燒香然燈於佛所生恭敬心觀世音菩薩而來入是壇內當誦此陀羅尼一百八遍是人所有一切罪障五逆重罪悉皆消滅身口意業皆得清淨得佛三昧力灌頂力波羅蜜地力殊勝智力悉皆成就若須雨時當視天誦此陀羅尼甘雨應時即下若視地誦此陀羅尼者能令百穀皆得成熟若於枯池河泉邊誦此陀羅尼者即得水還盈滿若一切病患當誦此陀羅尼以手摩之即得除差於失念者邊誦此陀羅尼還得正念若於飢渴人邊當視其面誦此陀羅尼所有飢渴悉皆消滅若欲結界當入池水中寫此陀羅尼繫著幢上一百由旬內無諸衰患即成就結界擁護成就總攝身印第一先起立端身並腳齊立右腳微曲少許先以左手舒下以中指無名指並屈著掌中小指食指以大母指散舒仰掌向上次以右手亦然屈肘與髆齊掌向前此是總攝身印若欲降伏魔怨及諸外道邪見稠林令入正道者當作此印誦陀羅尼二十一遍必如所願呪曰那上聲謨曷囉二合怛囉夜耶一那謨阿唎耶二婆路咭帝攝伐二合囉耶三菩提薩埵跛耶四二合摩訶薩埵跛耶五摩訶迦嚕尼迦耶六怛姪他七阿去聲跋陀阿跋陀八跋唎跋帝九堙醯夷醯十莎訶十一總持陀羅尼印第二準前身印上合掌當心以五指相叉左壓右以二頭指直竪頭相拄以大母指附頭指壓第一文上掌少開此印名總持陀羅尼法若人作此印者誦呪二十一遍能滅無量劫生死業障當來往生十方淨土往昔釋迦牟尼佛臨欲成道為魔王所惱作此總持陀羅尼印獲得禪定呪曰哆姪他薩婆陀羅尼一曼荼羅耶二堙醯夷醯三鉢羅麼輸馱四薩跢跛耶五莎訶解脫禪定印第三先偏袒右肩右膝著地合掌頂上屈二頭指以頭相拄二大指附頭指第二文上此法印名解脫禪定印過去諸佛同修此法得禪定解脫同前呪千眼印呪第四起立並足先以二中指無名指小指各以甲背相著其二頭指竪頭相拄其二大母指側搏附頭指第二文上側腕開五寸許置於眉間此名千眼印作此印呪法門者即得觀見百千萬億世界諸佛剎淨妙國土一一佛國各得百萬四千菩薩與行者為同伴侶若未經三曼荼羅者必不得見此印法門通作此法印親驗菩薩授法與智通凡有所願悉皆滿足呪曰唵一薩婆斫芻伽囉耶二陀羅尼三因去聲地丁涅切唎耶四莎訶五千臂總攝印第五起立並足先仰右手掌五指各相附後以左手掌仰壓右掌上當心著此名總攝千臂印此印能伏三千大千世界魔怨呪曰怛姪他一婆盧枳帝二攝伐囉耶三薩婆咄徒訥切瑟吒四烏訶耶彌五莎訶六通達三昧印第六起立以腳跟相拄先以左手竪五指相搏屈肘向前托次以右手亦然屈肘向內托此名通達三昧印此印能令通達一切三昧智印莊嚴八萬四千法門皆因此法得阿耨多羅三藐三菩提用前大身呪呼召天龍八部神鬼集會印第七起立並足先以左手無名指捻大母指甲上次以右手亦如是作二小指及中指直竪頭相拄合腕以頭指來去呪曰唵一薩婆提婆那伽二阿去聲那唎三莎訶四呼召大梵天王及憍尸迦來問法印第八準前印上開腕以手側相拄仰掌以頭指來去呪曰唵一魔訶梵摩去聲耶二堙醯夷醯三莎訶四此印呪法能攝無量無數陀羅尼印法門悉皆來集若日月蝕時呪酥二十一遍以印印酥食者令人聰明日誦萬偈此印法門日藏如來授與觀世音菩薩歡喜摩尼隨意明珠印第九起立合掌當心以二大母指雙屈入掌中餘四指直竪合掌當心誦前大身呪二十一遍決定得入諸天宮殿遊歷十方諸佛國土百千珍寶隨心皆得供養諸佛菩薩金剛一切聖衆若有人能作此法門者晨朝早起清淨澡漱作此印法面見十方恆河沙國土諸佛滅除無量劫來生死惡業重罪是故讚歎如是功德乞願隨心印第十準前印屈二頭指壓二大母指甲上其頭指甲背相著用前身呪若人隨所求願皆悉滿足必定不退菩提之道入滅盡定三昧印第十一準前印直竪散頭持大母指開掌此印我在因地時恆河沙諸佛授我此法令我得證菩提之道誦前大身呪請佛三昧印第十二準前印合掌當心頭指來去呪曰唵一薩婆勃陀三摩去聲耶二堙醯夷醯三鉢囉摩輸陀薩埵四莎訶五千眼千臂觀世音菩薩十肘曼荼羅法門凡作一切曼荼羅法門時謹按梵本云此國土無有作曼荼羅地如彼天竺皆取上勝福德之地以為壇場婆羅門國別有擇地方法不能廣說且論漢地第一山居間靜之處在山頂上有形勢處掘地去其石礫及瓦器惡物然始平治以瞿摩夷和香塗地縱廣一丈六尺起基十二指乃至十六指一肘以為勝上第一取白栴檀香於其石上磨取末塗曼荼羅上以五色粉謨界其壇安四門東門安提頭賴吒天王南方門安毗樓勒叉天王西門安毗樓博叉天王北門安毗沙門天王次安天王左右及眷屬各居本位其曼荼羅中心安千眼千臂觀世音菩薩像像前置案案上置呪法燒種種香安種種飲食散種種華以為供養唯除雜物葷辛酒肉自外日別造香鮮者華香果子於像前著三白食乳酪酥蜜燒檀香沈香蘇合龍腦等香每日三時洗浴受三律儀至心誦呪供養千眼觀世音菩薩晨朝午時日暮供養日別不闕如是乃至三七日盡意供養其呪師面向東方誦呪作前第一第二第三乃至十二請佛三昧印作前印一遍各誦呪七遍乃至第十二印畢當自發不退堅固意但作法呼召一切皆來令發菩提決定心端坐想一切呪神在其眼前一無障難不得異境誦前大身呪滿一千八十遍爾時觀世音菩薩現阿難身相貌來間行者所須何法求何願耶行者白言為求無上菩提陀羅尼法又願一切法壇皆悉成就一切鬼神悉皆順伏得如願已但自知之不得向人傳說又法若欲得求一切願者當作四肘水曼荼羅法燒沈水香誦前身呪一百八遍作前第十乞願印即得一切如願滿足稱心又法若欲得一切歡喜者作前第九歡喜摩尼隨意明珠印誦身呪呪烏麻二十一遍火中燒之即得如意獲得歡喜如意稱心又法若欲令曷囉二合闍歡喜者當取曷囉二合闍園內樹枝呪二十一遍擲置園中即得歡喜又法若欲降伏惡人怨家者當呪苦楝木二十一遍一呪一燒即得歸伏又法若有神鬼難調伏者取安悉香及白芥子呪二十一遍擲火中燒一切神鬼病者自然降伏若有疫病流行當作四肘水曼荼羅取好牛酥呪一百八遍火中燒之一切災疫悉皆消滅又取酥少分與疫病人食之立即除愈昔罽賓國有疫病流行人得病者不過一二日並死有婆羅門真諦起大慈悲心施此法門救療一國疫病應時消滅時行病鬼王應時出離國境故知有驗耳又法他國侵撓盜賊逆亂起來作前第一總攝身印呪一百八遍一切盜賊自然殄滅又法若一切業報衆生命根盡者作前滅盡定印日日供養燒沈水香誦呪滿一千八十遍即得轉其業障昔波羅奈國有一長者唯有一子壽年合得十六至年十五有一婆羅門巡門乞食見其長者愁憂不樂夫妻憔悴面無光澤婆羅門問曰長者何為不樂長者說向因緣婆羅門答曰長者不須愁憂但取貧道處分子得壽年長遠于時婆羅門作此法門一日一夜得閻羅王報云長者其子壽年只合十六今已十五唯有一年今遇善緣得年八十故來相報爾時長者夫妻歡喜踊躍罄捨家資以施佛法衆僧當知此法不可思議具大神驗以曾入大都會三曼荼羅金剛大道場者不須作曼荼羅唯結印誦呪無願不果速當成佛又法若有女人臨當産時受大苦惱呪酥二十一遍令彼食之必定安樂所生男女具大相好衆善莊嚴宿植德本令人愛敬常於人中受勝快樂又法若有衆生眼若痛者以菩薩千眼印呪二十一遍以印印眼眼即除愈以此大因緣其人獲得天眼光明徹見上界諸天受勝快樂又畫千眼千臂觀世音菩薩像法謹按梵本造像皆用白㲲廣十肘此土一丈六尺二十肘此土三丈二尺菩薩身作檀金色面有三眼一千臂一一掌中各有一眼彩色中不得著膠以香乳和彩色菩薩頭著七寶天冠身垂瓔珞又一本云此無好大白㲲但取一幅白絹菩薩身長五尺作兩臂依前第五千臂印法亦得供養不要千眼千臂此亦依梵本唯菩薩額上更安一眼即得若欲供養此法門者先須畫像其畫像法必須作曼荼羅如法令匠者受八戒齊出入一上廁一洗浴其像作成其畫匠及呪師恐多不如法對像懺悔罪過即安置曼荼羅中即須作法廣設供養滿三七日其千眼千臂觀世音菩薩像放大光明過於日月無量無邊普照三千大千世界皆悉大明一切衆生極大重罪一時消滅咸得清淨作此法門者除不至心其千眼千臂觀世音菩薩像法過去毗婆尸佛亦現作降魔身千眼各出一佛以為賢劫千佛也千臂各各化出一輪王為千代轉輪聖王此菩薩降魔身中最為第一爾時世尊告觀世音菩薩我以佛神力窮劫廣說不能得盡爾時觀世音菩薩聞佛說已歡喜信受作禮而退灌頂印先二大母指屈於掌中捻無名指無名指中節相背二小指頭相拄二中指直竪頭相拄二頭指屈各捻中指背上即呪曰唵一步三末囉二蘇摩鹽莎訶三誦呪二十一遍自灌其頂還復如故若欲續驗每日平旦於盆上結印誦呪持呪之人犯欲及五辛等穢當誦此呪解之
